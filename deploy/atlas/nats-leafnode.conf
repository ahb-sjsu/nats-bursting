# Snippet to append to Atlas's /home/claude/nats.conf
# Adds a leaf-node listener so the NRP (ssu-atlas-ai) leaf can
# dial in over TLS and participate in the agi.* event fabric.
#
# Exposed publicly via: atlas-sjsu.duckdns.org:7422 → router NAT → Atlas:7422
#
# Reload after editing:
#   sudo systemctl reload nats-server     # if managed by systemd
#   # or:
#   pkill -HUP -f nats-server
#
# Verify the listener is up:
#   ss -ltnp | grep 7422

leafnodes {
  # Listener port — same port exposed via router NAT.
  port: 7422

  # TLS — reuse the Let's Encrypt cert that Caddy already maintains
  # for atlas-sjsu.duckdns.org. Paths are typical Caddy v2 storage
  # locations; adjust if your Caddy data_dir differs. Confirm with:
  #   sudo find /var/lib/caddy /root/.local/share/caddy -name '*.crt' 2>/dev/null
  tls {
    cert_file: "/var/lib/caddy/.local/share/caddy/certificates/acme-v02.api.letsencrypt.org-directory/atlas-sjsu.duckdns.org/atlas-sjsu.duckdns.org.crt"
    key_file:  "/var/lib/caddy/.local/share/caddy/certificates/acme-v02.api.letsencrypt.org-directory/atlas-sjsu.duckdns.org/atlas-sjsu.duckdns.org.key"
    timeout:   5
  }

  # Auth — the NRP leaf authenticates as this user. The password in
  # nats.conf must be a bcrypt hash, generated with:
  #   nats server passwd
  # Keep the plaintext version for the NRP-side Secret.
  authorization {
    users: [
      { user: "ssu-atlas-ai-leaf", password: "$2a$11$REPLACE_WITH_BCRYPT_HASH" }
    ]
  }

  # Minimum cluster fingerprint check — prevents accidental cross-connect
  # if some other nats-server out there tries to dial us.
  # no_advertise: false
}
