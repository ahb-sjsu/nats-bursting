# tqp fleet wave coordinator - runs the whole campaign from INSIDE the
# namespace, so no Atlas->authentik OIDC dependency after launch.
#
# Sizing is deliberate and load-bearing: requests==limits cpu=1 / memory=2Gi
# is the ignored-class exemption from NRP utilization enforcement - idle-ish
# coordinators at larger sizes have been swept. Do not resize upward.
#
# The pod idles only inside bounded k8s watch streams (jobs watch,
# timeout_seconds) - no sleep infinity, no poll loop.
#
# Prerequisites (see README.md):
#   kubectl apply -f rbac.yaml
#   kubectl create configmap tqp-fleet-coordinator-code \
#     --from-file=coordinator.py --dry-run=client -o yaml | kubectl apply -f -
#   kubectl create configmap tqp-fleet-coordinator-tmpl \
#     --from-file=<the campaign job/pvc templates> \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# For the 1T campaign: change TQP_CAMPAIGN, TQP_N, and set TQP_PHASES to the
# 1T template names (schema in coordinator.py DEFAULT_PHASES), refresh the
# tmpl ConfigMap, and rename this Job (e.g. tqp-fleet-coordinator-1t).
apiVersion: batch/v1
kind: Job
metadata:
  name: tqp-fleet-coordinator-100b
  namespace: ssu-atlas-ai
  labels: {app: tqp-fleet, "atlas.io/batch": tqp-100b}
spec:
  backoffLimit: 0            # fail fast and loud (namespace convention);
                             # re-apply to resume - state is re-derived from
                             # Job status, nothing is lost
  ttlSecondsAfterFinished: 172800
  template:
    metadata:
      labels: {app: tqp-fleet, "atlas.io/batch": tqp-100b}
    spec:
      serviceAccountName: tqp-fleet-coordinator
      restartPolicy: Never
      containers:
      - name: coordinator
        image: python:3.12-slim
        command: ["/bin/bash", "-lc"]
        args:
        - |
          set -euo pipefail
          export PIP_ROOT_USER_ACTION=ignore PYTHONUNBUFFERED=1
          pip install -q --no-cache-dir kubernetes
          python /app/coordinator.py
        env:
        - {name: NATS_URL, value: "nats://atlas-nats:4222"}
        - {name: TQP_CAMPAIGN, value: "tqp-100b"}
        - {name: TQP_N, value: "50"}
        - {name: TQP_WAVE, value: "8"}
        - {name: TQP_MAXTRIES, value: "12"}
        - {name: TQP_TMPL_DIR, value: "/templates"}
        # - {name: TQP_PHASES, value: '[...]'}  # 1T override, JSON
        resources:
          requests: {cpu: "1", memory: 2Gi, ephemeral-storage: 1Gi}
          limits: {cpu: "1", memory: 2Gi, ephemeral-storage: 1Gi}
        volumeMounts:
        - {name: code, mountPath: /app}
        - {name: templates, mountPath: /templates}
      volumes:
      - name: code
        configMap: {name: tqp-fleet-coordinator-code}
      - name: templates
        configMap: {name: tqp-fleet-coordinator-tmpl}
