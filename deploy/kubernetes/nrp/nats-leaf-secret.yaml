# Leaf-node credentials for dialing Atlas.
#
# The "credentials" file format for NATS with user/password auth is:
#   -----BEGIN NATS USER JWT-----
#   ... (only used with NATS operator/accounts JWT mode)
#
# For basic user/password leaf auth (what the Atlas-side config uses),
# we pass username and password via the URL or as separate fields.
# This manifest uses the "creds" file style; if you prefer embedding
# user/password directly in nats.conf's leafnode remote, delete this
# Secret and switch to the URL form:
#   url: "tls://user:password@atlas-sjsu.duckdns.org:7422"
#
# DO NOT commit real credentials. Create imperatively:
#
#   kubectl create secret generic atlas-nats-leaf-creds \
#     --namespace ssu-atlas-ai \
#     --from-literal=user=ssu-atlas-ai-leaf \
#     --from-literal=password='<plaintext-password>'
#
# And rewrite the ConfigMap to use:
#   remotes: [ { url: "tls://$NATS_USER:$NATS_PASSWORD@atlas-sjsu.duckdns.org:7422" } ]
# with env substitution (requires nats-server 2.10+ with --var expansion
# or an init-container that templates nats.conf).
apiVersion: v1
kind: Secret
metadata:
  name: atlas-nats-leaf-creds
  namespace: ssu-atlas-ai
  labels:
    app.kubernetes.io/name: atlas-nats-leaf
    app.kubernetes.io/component: messaging
type: Opaque
stringData:
  # Plaintext user/password. These mount as files at
  # /etc/nats-leaf-creds/user and /etc/nats-leaf-creds/password
  # and are read by the init-container that templates nats.conf.
  user: "ssu-atlas-ai-leaf"
  password: "REPLACE_WITH_PLAINTEXT_PASSWORD"
