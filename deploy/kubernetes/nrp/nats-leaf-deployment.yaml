apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-nats-leaf
  namespace: ssu-atlas-ai
  labels:
    app.kubernetes.io/name: atlas-nats-leaf
    app.kubernetes.io/component: messaging
spec:
  replicas: 1
  strategy:
    type: Recreate    # a single leaf pod; no point in rolling
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas-nats-leaf
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas-nats-leaf
        app.kubernetes.io/component: messaging
    spec:
      # The leaf pod runs nats-server only; no Kubernetes API access
      # needed, so the default namespace ServiceAccount is fine.
      # Init container renders nats.conf with credentials from the Secret.
      # Keeps plaintext creds out of the ConfigMap.
      initContainers:
        - name: render-config
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              USER=$(cat /etc/nats-leaf-creds/user)
              PASS=$(cat /etc/nats-leaf-creds/password)
              # Inline-template the URL with embedded creds.
              sed "s|tls://atlas-sjsu.duckdns.org:7422|tls://${USER}:${PASS}@atlas-sjsu.duckdns.org:7422|" \
                /etc/nats-conf-template/nats.conf > /etc/nats-conf-rendered/nats.conf
              # Also strip the 'credentials:' line since we're using URL-embedded auth.
              sed -i '/credentials:/d' /etc/nats-conf-rendered/nats.conf
          volumeMounts:
            - name: nats-conf-template
              mountPath: /etc/nats-conf-template
              readOnly: true
            - name: nats-leaf-creds
              mountPath: /etc/nats-leaf-creds
              readOnly: true
            - name: nats-conf-rendered
              mountPath: /etc/nats-conf-rendered
      containers:
        - name: nats
          image: nats:2.10-alpine
          args:
            - "-c"
            - "/etc/nats-conf-rendered/nats.conf"
          ports:
            - name: client
              containerPort: 4222
            - name: monitor
              containerPort: 8222
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: nats-conf-rendered
              mountPath: /etc/nats-conf-rendered
              readOnly: true
      volumes:
        - name: nats-conf-template
          configMap:
            name: atlas-nats-leaf-config
        - name: nats-leaf-creds
          secret:
            secretName: atlas-nats-leaf-creds
        - name: nats-conf-rendered
          emptyDir: {}
