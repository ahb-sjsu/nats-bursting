apiVersion: apps/v1
kind: Deployment
metadata:
  name: nrp-telemetry
  namespace: ssu-atlas-ai
  labels:
    app: nrp-telemetry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nrp-telemetry
  template:
    metadata:
      labels:
        app: nrp-telemetry
    spec:
      containers:
      - name: telemetry
        image: python:3.12-slim
        command: ["python3", "-c"]
        args:
        - |
          import urllib.request, subprocess, sys, os
          urllib.request.urlretrieve(
              'https://raw.githubusercontent.com/ahb-sjsu/nats-bursting/main/deploy/kubernetes/nrp/nrp-telemetry.py',
              '/tmp/telemetry.py')
          # kubectl not available in this pod — use K8s API directly
          os.environ['NATS_URL'] = os.environ.get('NATS_URL', 'nats://atlas-nats:4222')
          exec(open('/tmp/telemetry.py').read())
        env:
        - name: NATS_URL
          value: "nats://atlas-nats:4222"
        - name: NAMESPACE
          value: "ssu-atlas-ai"
        - name: INTERVAL
          value: "30"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
      restartPolicy: Always
