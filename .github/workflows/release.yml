name: release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI (otherwise TestPyPI only)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------
  # Python client → PyPI via trusted publisher (OIDC, no tokens)
  # -----------------------------------------------------------
  pypi:
    name: Build + publish Python client
    runs-on: ubuntu-latest
    # See https://docs.pypi.org/trusted-publishers/ — the pypi-publish
    # action exchanges GitHub's OIDC token for a short-lived PyPI token.
    permissions:
      id-token: write  # required for OIDC trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        working-directory: python
        run: python -m build

      - name: Publish to TestPyPI (on dispatch without --publish)
        if: github.event_name == 'workflow_dispatch' && inputs.publish == false
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish == true)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/

  # -----------------------------------------------------------
  # Go binary → GitHub Release artifacts
  # -----------------------------------------------------------
  go-release:
    name: Build Go binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # upload release assets
    strategy:
      matrix:
        include:
          - { os: linux,  arch: amd64 }
          - { os: linux,  arch: arm64 }
          - { os: darwin, arch: arm64 }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build ${{ matrix.os }}/${{ matrix.arch }}
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          out="nats-bursting_${{ github.ref_name }}_${{ matrix.os }}_${{ matrix.arch }}"
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "dist/${out}" ./cmd/nats-bursting
          tar -C dist -czf "dist/${out}.tar.gz" "${out}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # -----------------------------------------------------------
  # Container image → GHCR
  # -----------------------------------------------------------
  image:
    name: Build + push container image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
