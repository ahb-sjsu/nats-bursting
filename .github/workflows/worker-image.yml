name: worker-image

# Builds + pushes the E8 GPU burst worker image to ghcr. Run via the Actions
# "Run workflow" button or `gh workflow run worker-image.yml`, or by pushing a
# `worker-v*` tag. Separate from release.yml so the (large, CUDA) worker image
# is built on demand, not on every release.
on:
  workflow_dispatch:
  push:
    tags: ["worker-v*"]

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}-worker
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: deploy/worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
