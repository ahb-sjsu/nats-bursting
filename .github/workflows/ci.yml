name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------
  # Go controller
  # ---------------------------------------------------------------
  go:
    name: Go (${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.23", "1.24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Verify modules
        run: go mod verify

      - name: Format check (gofmt)
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "::error::gofmt violations:"
            echo "$diff"
            gofmt -d .
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test with race detector and coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        run: |
          go tool cover -func=coverage.out | tail -20
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"

      - name: Upload coverage artifact
        if: matrix.go == '1.23'
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out

  # ---------------------------------------------------------------
  # Python client + IPython magic
  # ---------------------------------------------------------------
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[ipython,dev]'

      - name: Ruff (lint)
        working-directory: python
        run: ruff check .

      - name: Black (format check)
        working-directory: python
        run: black --check .

      - name: Pytest with coverage
        working-directory: python
        run: pytest --cov=nats_bursting --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: py-coverage
          path: python/coverage.xml

  # ---------------------------------------------------------------
  # Release-readiness build
  # ---------------------------------------------------------------
  build:
    name: Build binary + container smoke
    runs-on: ubuntu-latest
    needs: [go, python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Cross-build Go binary (linux/amd64)
        env:
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -ldflags="-s -w" -o dist/nats-bursting ./cmd/nats-bursting
          ls -la dist/
          file dist/nats-bursting
      - name: Container image smoke
        run: docker build -t nats-bursting:ci .

  # ---------------------------------------------------------------
  # Python package build smoke (ensures pyproject.toml is installable)
  # ---------------------------------------------------------------
  package:
    name: Python package build
    runs-on: ubuntu-latest
    needs: [python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build + twine
        run: python -m pip install --upgrade build twine
      - name: Build sdist + wheel
        working-directory: python
        run: python -m build
      - name: Twine check
        working-directory: python
        run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: python/dist/
