name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.23", "1.24"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: Verify modules
        run: go mod verify
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -coverprofile=coverage.out ./...
      - name: Coverage report
        run: go tool cover -func=coverage.out | tail -1

  python:
    name: Python client (atlas-burst pip pkg)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[ipython,dev]'
      - name: Lint with ruff
        working-directory: python
        run: ruff check .
      - name: Format check with black
        working-directory: python
        run: black --check .
      - name: Test
        working-directory: python
        run: pytest -q

  build:
    name: Build binary + container
    runs-on: ubuntu-latest
    needs: [test, python]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Build
        run: |
          mkdir -p dist
          CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/atlas-burst ./cmd/atlas-burst
      - name: Image build (smoke test only)
        run: docker build -t atlas-burst:ci .
